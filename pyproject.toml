[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "astrageek"
authors = [
    {name = "Ilia Bespyatyy", email = "ilia.bespytatyy@gmail.com"},
    {name = "Maksim Ramenskyy", email = "maksim.ramenskyy@gmail.com"},
]
description = "Star maps maker"
readme = "README.md"
requires-python = ">=3.8"
keywords = ["skychart", "python", "astronomy", "maps"]
license = "MIT"
classifiers = [
    "Programming Language :: Python :: 3",
]
dependencies = [
    "numpy",
    "matplotlib",
    "astropy",
    "scipy",
    "pandas",
    "pygame",        # messier_pygame/
    "pillow",        # PIL
    "loguru",
    "click>=8.0"
]
version = "0.2.0"

[tool.setuptools.packages.find]
where = ["."]

[project.scripts]
astrageek = "src.interface.cli:cli"