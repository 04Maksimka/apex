<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraGeek — Угадай созвездие</title>
  <style>
    :root {
      --bg:#060612;--surface:#0e0e2a;--surface2:#161636;
      --accent:#7b61ff;--accent2:#4fc3f7;--gold:#ffd54f;
      --text:#e8eaf6;--muted:#7986cb;--radius:14px;
      --green:#66bb6a;--red:#ef5350;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

    /* ── Top bar ── */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 24px;background:var(--surface);
      border-bottom:1px solid rgba(123,97,255,.2);
      position:sticky;top:0;z-index:100;
    }
    .topbar-left{display:flex;align-items:center;gap:16px;}
    .back-btn{color:var(--muted);text-decoration:none;font-size:.9rem;display:flex;align-items:center;gap:6px;}
    .back-btn:hover{color:var(--text);}
    .game-title{font-weight:700;font-size:1rem;}
    .topbar-right{display:flex;align-items:center;gap:20px;}
    .stat-chip{
      background:var(--surface2);border-radius:20px;
      padding:6px 14px;font-size:.85rem;display:flex;align-items:center;gap:6px;
    }
    .stat-chip .val{font-weight:700;color:var(--accent2);}
    .streak-chip .val{color:var(--gold);}

    /* ── Progress ── */
    .progress-wrap{padding:10px 24px 0;background:var(--surface);}
    .progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;}

    /* ── Main layout ── */
    main{max-width:900px;margin:0 auto;padding:32px 20px 60px;}

    /* ── Question ── */
    .question-label{
      text-align:center;font-size:1.05rem;color:var(--muted);
      margin-bottom:20px;min-height:28px;
    }

    /* ── Sky image ── */
    .sky-wrap{
      position:relative;border-radius:var(--radius);overflow:hidden;
      border:1px solid rgba(123,97,255,.25);margin-bottom:28px;
      background:#020208;text-align:center;
    }
    .sky-wrap img{width:100%;max-height:460px;object-fit:contain;display:block;}
    .sky-loader{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      background:var(--bg);font-size:.9rem;color:var(--muted);gap:10px;
    }
    .spinner{
      width:24px;height:24px;border:3px solid rgba(123,97,255,.3);
      border-top-color:var(--accent);border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── Options ── */
    .options{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;
    }
    @media(max-width:480px){.options{grid-template-columns:1fr;}}
    .opt-btn{
      background:var(--surface2);border:2px solid rgba(123,97,255,.2);
      border-radius:var(--radius);padding:16px 20px;
      color:var(--text);font-size:1rem;font-weight:600;
      cursor:pointer;text-align:left;transition:all .15s;
    }
    .opt-btn:hover:not(:disabled){background:#1c1c46;border-color:var(--accent);}
    .opt-btn:disabled{cursor:default;}
    .opt-btn.correct{background:rgba(102,187,106,.15);border-color:var(--green);color:var(--green);}
    .opt-btn.wrong  {background:rgba(239,83,80,.12); border-color:var(--red);  color:var(--red);}

    /* ── Bottom controls ── */
    .controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .btn{
      padding:12px 28px;border-radius:30px;font-weight:700;font-size:.95rem;
      cursor:pointer;border:none;transition:all .15s;
    }
    .btn-hint{background:rgba(123,97,255,.18);color:var(--accent);border:1px solid rgba(123,97,255,.4);}
    .btn-hint:hover{background:rgba(123,97,255,.3);}
    .btn-hint:disabled{opacity:.4;cursor:default;}
    .btn-next{background:var(--accent);color:#fff;}
    .btn-next:hover{filter:brightness(1.15);}
    .btn-next:disabled{opacity:.4;cursor:default;}

    /* ── Result overlay card ── */
    .result-card{
      margin-top:24px;border-radius:var(--radius);padding:20px 24px;
      border:1px solid;animation:fadeIn .3s;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    .result-card.correct-card{background:rgba(102,187,106,.1);border-color:var(--green);}
    .result-card.wrong-card  {background:rgba(239,83,80,.08); border-color:var(--red);}
    .result-title{font-size:1.1rem;font-weight:700;margin-bottom:8px;}
    .result-fact {color:var(--muted);font-size:.88rem;line-height:1.6;margin-top:8px;}
    .points-badge{
      display:inline-block;background:var(--gold);color:#000;
      font-weight:800;font-size:.85rem;padding:3px 12px;border-radius:12px;margin-left:8px;
    }

    /* ── Hint box ── */
    .hint-box{
      display:none;background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.3);
      border-radius:10px;padding:12px 16px;color:var(--accent2);font-size:.88rem;
      margin-bottom:16px;
    }

    /* ── Finish screen ── */
    .finish-screen{
      display:none;text-align:center;padding:60px 20px;
    }
    .finish-rank{font-size:2.8rem;margin-bottom:8px;}
    .finish-score{font-size:1.2rem;color:var(--muted);}
    .finish-score span{color:var(--gold);font-weight:800;font-size:1.8rem;}
    .finish-stats{
      display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin:28px 0;
    }
    .fstat{
      background:var(--surface2);border-radius:var(--radius);padding:16px 24px;
      min-width:120px;
    }
    .fstat .n{font-size:2rem;font-weight:800;color:var(--accent2);}
    .fstat .l{font-size:.8rem;color:var(--muted);}
    .finish-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
    .btn-restart{background:var(--accent);color:#fff;}
    .btn-lobby{background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,.1);}
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/game/lobby" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Выбор игры
    </a>
    <div class="game-title">🔭 Угадай созвездие</div>
  </div>
  <div class="topbar-right">
    <div class="stat-chip">Раунд <span class="val" id="hdr-round">0</span>/<span id="hdr-total">10</span></div>
    <div class="stat-chip">Очки <span class="val" id="hdr-score">0</span></div>
    <div class="stat-chip streak-chip">🔥 <span class="val" id="hdr-streak">0</span></div>
  </div>
</div>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<main>
  <!-- Game area -->
  <div id="game-area">
    <div class="question-label" id="question-label">Загрузка...</div>

    <div class="sky-wrap" id="sky-wrap">
      <div class="sky-loader" id="sky-loader">
        <div class="spinner"></div> Генерируем карту неба…
      </div>
      <img id="sky-img" src="" alt="Карта неба" style="display:none" />
    </div>

    <div class="hint-box" id="hint-box"></div>

    <div class="options" id="options"></div>
    <div id="result-area"></div>

    <div class="controls">
      <button class="btn btn-hint" id="btn-hint" onclick="useHint()">💡 Подсказка (−50%)</button>
      <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" disabled>Следующий →</button>
    </div>
  </div>

  <!-- Finish screen -->
  <div class="finish-screen" id="finish-screen">
    <div class="finish-rank" id="finish-rank">🌌</div>
    <h2 style="margin-bottom:6px">Игра завершена!</h2>
    <div class="finish-score">Итоговый счёт: <span id="finish-score-val">0</span></div>
    <div class="finish-stats">
      <div class="fstat"><div class="n" id="fs-correct">0</div><div class="l">правильных</div></div>
      <div class="fstat"><div class="n" id="fs-acc">0%</div><div class="l">точность</div></div>
      <div class="fstat"><div class="n" id="fs-streak">0</div><div class="l">лучшая серия</div></div>
    </div>
    <div class="finish-actions">
      <button class="btn btn-restart" onclick="restartGame()">🔄 Играть снова</button>
      <button class="btn btn-lobby" onclick="window.location.href='/game/lobby'">🎮 Выбор игры</button>
    </div>
  </div>
</main>

<script>
  const MODE = 'constellation';
  const params = new URLSearchParams(location.search);
  const DIFFICULTY = params.get('difficulty') || 'easy';
  const ROUNDS = parseInt(params.get('rounds') || '10');

  let sessionId = null;
  let usedHint = false;
  let questionStartTime = null;
  let answered = false;

  // ── Init ──
  async function initGame() {
    const resp = await fetch('/game/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: MODE, difficulty: DIFFICULTY, rounds: ROUNDS }),
    });
    const data = await resp.json();
    sessionId = data.session_id;
    updateHeader(data);
    await loadQuestion();
  }

  // ── Load question ──
  async function loadQuestion() {
    answered = false;
    usedHint = false;
    document.getElementById('hint-box').style.display = 'none';
    document.getElementById('result-area').innerHTML = '';
    document.getElementById('btn-hint').disabled = false;
    document.getElementById('btn-next').disabled = true;
    document.getElementById('sky-loader').style.display = 'flex';
    document.getElementById('sky-img').style.display = 'none';
    setOptionsDisabled(false);
    document.getElementById('options').innerHTML = '';

    const resp = await fetch(`/game/api/question?session_id=${sessionId}`);
    const data = await resp.json();

    if (data.finished) {
      showFinish(data);
      return;
    }

    updateHeader(data.session);
    document.getElementById('question-label').textContent = data.question;

    // Load image
    const img = document.getElementById('sky-img');
    const _showImg = () => {
      document.getElementById('sky-loader').style.display = 'none';
      img.style.display = 'block';
    };
    img.onload = _showImg;
    img.onerror = _showImg;   // показать область даже при ошибке декодирования
    img.src = '';             // сброс состояния "complete" в браузере
    img.src = 'data:image/png;base64,' + data.image;
    // Fallback: браузер уже декодировал изображение синхронно
    if (img.complete && img.naturalHeight > 0) _showImg();

    // Render options
    const optEl = document.getElementById('options');
    data.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = () => submitAnswer(opt);
      optEl.appendChild(btn);
    });

    questionStartTime = Date.now();
  }

  // ── Submit answer ──
  async function submitAnswer(answer) {
    if (answered) return;
    answered = true;
    setOptionsDisabled(true);
    document.getElementById('btn-hint').disabled = true;

    const timeSec = ((Date.now() - questionStartTime) / 1000).toFixed(1);
    const resp = await fetch('/game/api/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        answer: answer,
        used_hint: usedHint,
        time_seconds: parseFloat(timeSec),
      }),
    });
    const data = await resp.json();   // или r.json() в game_messier
    // Обработка ошибки сервера (например "No active question")
    if (data.error) {
      console.error('Ошибка ответа:', data.error);
      // Сброс флага и перезагрузка вопроса
      answered = false;
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
      document.getElementById('result-area').innerHTML =
        `<div style="color:#f87171;text-align:center">⚠️ Ошибка: ${data.error}. Перезагрузка...</div>`;
      setTimeout(() => loadQuestion(), 1500);
      return;
    }
    updateHeader(data);
    highlightOptions(data.correct, data.correct_answer, answer);
    showResult(data);
    document.getElementById('btn-next').disabled = false;
  }

  // ── Hint ──
  async function useHint() {
    document.getElementById('btn-hint').disabled = true;
    usedHint = true;
    const resp = await fetch(`/game/api/hint?session_id=${sessionId}`);
    const data = await resp.json();
    const hintBox = document.getElementById('hint-box');
    hintBox.textContent = '💡 ' + (data.hint || 'Подсказка недоступна');
    hintBox.style.display = 'block';
  }

  // ── Next ──
  async function nextQuestion() {
    document.getElementById('btn-next').disabled = true;
    await loadQuestion();
  }

  // ── UI helpers ──
  function updateHeader(session) {
    const s = session || {};
    document.getElementById('hdr-round').textContent  = s.round || 0;
    document.getElementById('hdr-total').textContent  = s.total_rounds || ROUNDS;
    document.getElementById('hdr-score').textContent = s.total_score ?? s.score ?? 0;
    document.getElementById('hdr-streak').textContent = s.streak || 0;
    const pct = ((s.round || 0) / (s.total_rounds || ROUNDS)) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function setOptionsDisabled(disabled) {
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = disabled);
  }

  function highlightOptions(correct, correctAnswer, playerAnswer) {
    document.querySelectorAll('.opt-btn').forEach(btn => {
      if (btn.textContent === correctAnswer) btn.classList.add('correct');
      else if (btn.textContent === playerAnswer && !correct) btn.classList.add('wrong');
    });
  }

  function showResult(data) {
    const el = document.getElementById('result-area');
    const cls = data.correct ? 'correct-card' : 'wrong-card';
    const icon = data.correct ? '✅' : '❌';
    const pts = data.correct ? `<span class="points-badge">+${data.points_earned}</span>` : '';
    el.innerHTML = `
      <div class="result-card ${cls}">
        <div class="result-title">${icon} ${data.correct ? 'Верно!' : 'Неверно.'} ${pts}</div>
        ${!data.correct ? `<div style="font-size:.9rem;margin-top:4px">Правильный ответ: <b>${data.correct_answer}</b></div>` : ''}
        <div class="result-fact">${data.fun_fact}</div>
      </div>`;
  }

  function showFinish(data) {
    document.getElementById('game-area').style.display = 'none';
    const fs = document.getElementById('finish-screen');
    fs.style.display = 'block';
    document.getElementById('finish-rank').textContent = data.rank || '🌌';
    document.getElementById('finish-score-val').textContent = data.score || 0;
    document.getElementById('fs-correct').textContent = data.correct_count || 0;
    document.getElementById('fs-acc').textContent = (data.accuracy || 0) + '%';
    document.getElementById('fs-streak').textContent = data.best_streak || 0;
  }

  function restartGame() {
    location.href = `/game/constellation?difficulty=${DIFFICULTY}&rounds=${ROUNDS}`;
  }

  initGame();
</script>
</body>
</html>
