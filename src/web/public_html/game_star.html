<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraGeek — Назови звезду</title>
  <style>
    :root {
      --bg: #060612;
      --surface: #0e0e2a;
      --surface2: #161636;
      --accent: #7b61ff;
      --accent2: #4fc3f7;
      --gold: #ffd54f;
      --text: #e8eaf6;
      --muted: #7986cb;
      --correct: #66bb6a;
      --wrong: #ef5350;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,.06);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-left  { display: flex; align-items: center; gap: 16px; }
    .topbar-right { display: flex; gap: 8px; flex-wrap: wrap; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none; font-size: .85rem;
      padding: 6px 10px; border-radius: 8px;
      transition: background .2s;
    }
    .back-btn:hover { background: rgba(255,255,255,.06); }
    .game-title { font-size: 1rem; font-weight: 700; }
    .stat-chip {
      background: var(--surface2); border-radius: 8px;
      padding: 4px 12px; font-size: .82rem; color: var(--muted);
    }
    .stat-chip .val { color: var(--text); font-weight: 700; }
    .streak-chip .val { color: var(--gold); }

    /* ── Progress ── */
    .progress-wrap { background: var(--surface2); height: 4px; }
    .progress-bar  { height: 100%; background: var(--surface2); }
    .progress-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); transition: width .4s; }

    /* ── Main ── */
    main { max-width: 760px; margin: 0 auto; padding: 24px 16px 60px; }

    .question-label {
      text-align: center; font-size: 1.05rem; font-weight: 600;
      color: var(--accent2); margin-bottom: 12px;
    }

    /* ── Star legend ── */
    .star-legend {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; font-size: .82rem; color: var(--muted);
      margin-bottom: 14px;
    }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #ff6b6b; background: rgba(255,107,107,.15);
    }

    /* ── Sky image ── */
    .sky-wrap {
      background: #020208; border-radius: var(--radius);
      overflow: hidden; aspect-ratio: 4/3;
      position: relative; margin-bottom: 20px;
    }
    .sky-loader {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
      color: var(--muted); font-size: .88rem;
    }
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid rgba(123,97,255,.2);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #sky-img { width: 100%; height: 100%; object-fit: contain; display: none; }

    /* ── Difficulty badge ── */
    .difficulty-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .8rem; font-weight: 600; padding: 4px 12px;
      border-radius: 20px; margin-bottom: 16px;
    }
    .diff-easy   { background: rgba(102,187,106,.15); color: #66bb6a; border: 1px solid rgba(102,187,106,.3); }
    .diff-medium { background: rgba(255,167,38,.15);  color: #ffa726; border: 1px solid rgba(255,167,38,.3); }
    .diff-hard   { background: rgba(239,83,80,.15);   color: #ef5350; border: 1px solid rgba(239,83,80,.3); }

    /* ── Options (Easy) ── */
    .options {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 16px;
    }
    .opt-btn {
      background: var(--surface2); color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px; padding: 14px 16px;
      font-size: .9rem; text-align: left; cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .opt-btn:hover:not(:disabled) { background: #1e1e46; border-color: var(--accent); }
    .opt-btn.correct { background: rgba(102,187,106,.18); border-color: var(--correct); color: var(--correct); }
    .opt-btn.wrong   { background: rgba(239,83,80,.18);   border-color: var(--wrong);   color: var(--wrong); }
    .opt-btn:disabled { cursor: default; }

    /* ── Text input area (Medium & Hard) ── */
    .input-area {
      margin-bottom: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-label {
      font-size: .8rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .star-input {
      background: var(--surface2); color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 13px 16px;
      font-size: .95rem; width: 100%;
      transition: border-color .2s;
    }
    .star-input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(123,97,255,.15);
    }
    .star-input.input-correct { border-color: var(--correct); background: rgba(102,187,106,.08); }
    .star-input.input-wrong   { border-color: var(--wrong);   background: rgba(239,83,80,.08); }
    .star-input:disabled      { opacity: .6; cursor: default; }

    .coords-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .coord-input {
      background: var(--surface2); color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 13px 16px;
      font-size: .95rem; width: 100%;
      transition: border-color .2s;
      -moz-appearance: textfield;
    }
    .coord-input::-webkit-outer-spin-button,
    .coord-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .coord-input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(123,97,255,.15);
    }
    .coord-input:disabled { opacity: .6; cursor: default; }
    .coord-hint { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    .btn-submit {
      background: linear-gradient(135deg, var(--accent), #9575cd);
      color: #fff; border: none; border-radius: 12px;
      padding: 13px 28px; font-size: .95rem; font-weight: 700;
      cursor: pointer; width: 100%;
      transition: opacity .2s, transform .1s;
    }
    .btn-submit:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: .5; cursor: default; }

    /* ── Validation feedback ── */
    .partial-result {
      font-size: .85rem; padding: 8px 12px;
      border-radius: 8px; margin-top: 4px;
    }
    .partial-correct { background: rgba(102,187,106,.12); color: var(--correct); }
    .partial-wrong   { background: rgba(239,83,80,.12);   color: var(--wrong); }

    /* ── Result ── */
    .result-card {
      border-radius: 12px; padding: 14px 18px; margin-bottom: 12px;
    }
    .correct-card { background: rgba(102,187,106,.12); border: 1px solid rgba(102,187,106,.3); }
    .wrong-card   { background: rgba(239,83,80,.12);   border: 1px solid rgba(239,83,80,.3); }
    .result-title { font-size: 1rem; font-weight: 700; }
    .result-fact  { color: var(--muted); font-size: .88rem; line-height: 1.6; margin-top: 8px; }
    .correct-answer-display {
      font-size: .88rem; margin-top: 6px; color: var(--text);
    }
    .points-badge {
      display: inline-block; background: var(--gold); color: #000;
      font-weight: 800; font-size: .85rem;
      padding: 3px 12px; border-radius: 12px; margin-left: 8px;
    }

    /* ── Hint ── */
    .hint-box {
      display: none;
      background: rgba(79,195,247,.08);
      border: 1px solid rgba(79,195,247,.3);
      border-radius: 10px; padding: 12px 16px;
      color: var(--accent2); font-size: .88rem; margin-bottom: 16px;
    }

    /* ── Controls ── */
    .controls { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
    .btn {
      border: none; border-radius: 12px; padding: 11px 22px;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-hint { background: var(--surface2); color: var(--muted); flex: 1; }
    .btn-next { background: var(--accent); color: #fff; flex: 1; }

    /* ── Finish screen ── */
    .finish-screen { display: none; text-align: center; padding: 60px 20px; }
    .finish-rank   { font-size: 2.8rem; margin-bottom: 8px; }
    .finish-score  { font-size: 1.2rem; color: var(--muted); }
    .finish-score span { color: var(--gold); font-weight: 800; font-size: 1.8rem; }
    .finish-stats  { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 28px 0; }
    .fstat { background: var(--surface2); border-radius: var(--radius); padding: 16px 24px; min-width: 120px; }
    .fstat .n { font-size: 2rem; font-weight: 800; color: var(--accent2); }
    .fstat .l { font-size: .8rem; color: var(--muted); }
    .finish-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    .btn-restart { background: var(--accent); color: #fff; }
    .btn-lobby   { background: var(--surface2); color: var(--text); border: 1px solid rgba(255,255,255,.1); }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/game/lobby" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Выбор игры
    </a>
    <div class="game-title">⭐ Назови звезду</div>
  </div>
  <div class="topbar-right">
    <div class="stat-chip">Раунд <span class="val" id="hdr-round">0</span>/<span id="hdr-total">10</span></div>
    <div class="stat-chip">Очки <span class="val" id="hdr-score">0</span></div>
    <div class="stat-chip streak-chip">🔥 <span class="val" id="hdr-streak">0</span></div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<main>
  <!-- Game area -->
  <div id="game-area">

    <!-- Difficulty badge -->
    <div style="text-align:center;margin-bottom:10px">
      <span id="diff-badge" class="difficulty-badge"></span>
    </div>

    <div class="question-label" id="question-label">Загрузка...</div>

    <div class="star-legend">
      <div class="legend-dot"></div>
      Звезда отмечена красным кольцом в центре изображения
    </div>

    <div class="sky-wrap" id="sky-wrap">
      <div class="sky-loader" id="sky-loader">
        <div class="spinner"></div> Генерируем карту неба…
      </div>
      <img id="sky-img" src="" alt="Карта неба" style="display:none" />
    </div>

    <div class="hint-box" id="hint-box"></div>

    <!-- Easy: option buttons -->
    <div class="options" id="options"></div>

    <!-- Medium / Hard: text inputs (hidden initially) -->
    <div class="input-area" id="input-area" style="display:none">
      <!-- Name input — always shown for medium & hard -->
      <div class="input-group">
        <label class="input-label">Название звезды</label>
        <input type="text" id="star-name-input" class="star-input"
               placeholder="Например: Sirius, Rigel, Betelgeuse…" autocomplete="off" spellcheck="false">
      </div>

      <!-- Coordinate inputs — shown for hard only -->
      <div id="coords-block" style="display:none">
        <div class="input-group" style="margin-bottom:2px">
          <label class="input-label">Экваториальные координаты <span style="color:var(--gold)">(±10°)</span></label>
        </div>
        <div class="coords-row">
          <div class="input-group">
            <label class="input-label">Прямое восхождение RA</label>
            <input type="number" id="star-ra-input" class="coord-input"
                   min="0" max="360" step="1" placeholder="0">
            <div class="coord-hint">Градусы, 0° – 360°</div>
          </div>
          <div class="input-group">
            <label class="input-label">Склонение Dec</label>
            <input type="number" id="star-dec-input" class="coord-input"
                   min="-90" max="90" step="1" placeholder="0">
            <div class="coord-hint">Градусы, −90° – +90°</div>
          </div>
        </div>
      </div>

      <button class="btn-submit" id="btn-submit-answer" onclick="submitInputAnswer()">
        Ответить →
      </button>
    </div>

    <div id="result-area"></div>

    <div class="controls">
      <button class="btn btn-hint" id="btn-hint" onclick="useHint()">💡 Подсказка (−50%)</button>
      <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" disabled>Следующий →</button>
    </div>
  </div>

  <!-- Finish screen -->
  <div class="finish-screen" id="finish-screen">
    <div class="finish-rank" id="finish-rank">⭐</div>
    <h2 style="margin-bottom:6px">Игра завершена!</h2>
    <div class="finish-score">Итоговый счёт: <span id="finish-score-val">0</span></div>
    <div class="finish-stats">
      <div class="fstat"><div class="n" id="fs-correct">0</div><div class="l">правильных</div></div>
      <div class="fstat"><div class="n" id="fs-acc">0%</div><div class="l">точность</div></div>
      <div class="fstat"><div class="n" id="fs-streak">0</div><div class="l">лучшая серия</div></div>
    </div>
    <div class="finish-actions">
      <button class="btn btn-restart" onclick="restartGame()">🔄 Играть снова</button>
      <button class="btn btn-lobby" onclick="window.location.href='/game/lobby'">🎮 Выбор игры</button>
    </div>
  </div>
</main>

<script>
  const MODE = 'star';
  const params = new URLSearchParams(location.search);
  const DIFFICULTY = params.get('difficulty') || 'easy';
  const ROUNDS = parseInt(params.get('rounds') || '10');

  let sessionId = null, usedHint = false, questionStartTime = null, answered = false;

  // ── Difficulty badge ─────────────────────────────────────────────────────
  (function renderBadge() {
    const badge = document.getElementById('diff-badge');
    const map = {
      easy:   { cls: 'diff-easy',   text: '🟢 Легко — выбор из 4 вариантов' },
      medium: { cls: 'diff-medium', text: '🟠 Средне — введите название звезды' },
      hard:   { cls: 'diff-hard',   text: '🔴 Сложно — название + координаты' },
    };
    const d = map[DIFFICULTY] || map.easy;
    badge.className = 'difficulty-badge ' + d.cls;
    badge.textContent = d.text;
  })();

  // ── Init ─────────────────────────────────────────────────────────────────
  async function initGame() {
    const resp = await fetch('/game/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: MODE, difficulty: DIFFICULTY, rounds: ROUNDS }),
    });
    const data = await resp.json();
    sessionId = data.session_id;
    updateHeader(data);
    await loadQuestion();
  }

  // ── Load question ─────────────────────────────────────────────────────────
  async function loadQuestion() {
    answered = false;
    usedHint = false;

    document.getElementById('hint-box').style.display = 'none';
    document.getElementById('result-area').innerHTML = '';
    document.getElementById('btn-hint').disabled = false;
    document.getElementById('btn-next').disabled = true;
    document.getElementById('sky-loader').style.display = 'flex';
    document.getElementById('sky-img').style.display = 'none';

    // Reset input area
    document.getElementById('options').innerHTML = '';
    document.getElementById('options').style.display = '';
    document.getElementById('input-area').style.display = 'none';
    const nameInput = document.getElementById('star-name-input');
    const raInput   = document.getElementById('star-ra-input');
    const decInput  = document.getElementById('star-dec-input');
    if (nameInput) { nameInput.value = ''; nameInput.className = 'star-input'; nameInput.disabled = false; }
    if (raInput)   { raInput.value = '';   raInput.disabled = false; }
    if (decInput)  { decInput.value = '';  decInput.disabled = false; }

    const resp = await fetch(`/game/api/question?session_id=${sessionId}`);
    const data = await resp.json();
    if (data.finished) { showFinish(data); return; }

    updateHeader(data.session);
    document.getElementById('question-label').textContent = data.question;

    // Load image
    const img = document.getElementById('sky-img');
    const _showImg = () => {
      document.getElementById('sky-loader').style.display = 'none';
      img.style.display = 'block';
    };
    img.onload = _showImg;
    img.onerror = _showImg;   // показать область даже при ошибке декодирования
    img.src = '';             // сброс состояния "complete" в браузере
    img.src = 'data:image/png;base64,' + data.image;
    // Fallback: браузер уже декодировал изображение синхронно
    if (img.complete && img.naturalHeight > 0) _showImg();

    // Render answer UI based on difficulty
    if (DIFFICULTY === 'easy') {
      renderEasyOptions(data.options || []);
    } else if (DIFFICULTY === 'medium') {
      renderTextInput(false);
    } else if (DIFFICULTY === 'hard') {
      renderTextInput(true);
    }

    questionStartTime = Date.now();
  }

  // ── Easy: 4 option buttons ────────────────────────────────────────────────
  function renderEasyOptions(options) {
    const optEl = document.getElementById('options');
    optEl.style.display = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = () => submitAnswerEasy(opt);
      optEl.appendChild(btn);
    });
  }

  // ── Medium / Hard: text + coord inputs ───────────────────────────────────
  function renderTextInput(showCoords) {
    document.getElementById('options').style.display = 'none';
    document.getElementById('coords-block').style.display = showCoords ? '' : 'none';
    document.getElementById('input-area').style.display = '';
    document.getElementById('btn-submit-answer').disabled = false;

    // Focus & Enter key support
    const nameInput = document.getElementById('star-name-input');
    nameInput.focus();

    // Remove old listeners to avoid duplicates
    nameInput.onkeydown = null;
    nameInput.addEventListener('keydown', function onEnter(e) {
      if (e.key === 'Enter') {
        nameInput.removeEventListener('keydown', onEnter);
        submitInputAnswer();
      }
    });

    if (showCoords) {
      document.getElementById('star-dec-input').onkeydown = (e) => {
        if (e.key === 'Enter') submitInputAnswer();
      };
    }
  }

  // ── Submit: easy (button click) ───────────────────────────────────────────
  async function submitAnswerEasy(answer) {
    if (answered) return;
    answered = true;
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    document.getElementById('btn-hint').disabled = true;

    const timeSec = ((Date.now() - questionStartTime) / 1000).toFixed(1);
    const resp = await fetch('/game/api/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        answer: answer,
        used_hint: usedHint,
        time_seconds: parseFloat(timeSec),
      }),
    });
    const data = await resp.json();
    updateHeader(data);

    // Highlight correct / wrong buttons
    document.querySelectorAll('.opt-btn').forEach(btn => {
      if (btn.textContent === data.correct_answer) btn.classList.add('correct');
      else if (btn.textContent === answer && !data.correct) btn.classList.add('wrong');
    });

    showResult(data);
    document.getElementById('btn-next').disabled = false;
  }

  // ── Submit: medium / hard (input fields) ─────────────────────────────────
  async function submitInputAnswer() {
    if (answered) return;

    const nameInput = document.getElementById('star-name-input');
    const starName = (nameInput.value || '').trim();

    if (!starName) {
      nameInput.focus();
      nameInput.style.borderColor = 'var(--wrong)';
      setTimeout(() => nameInput.style.borderColor = '', 800);
      return;
    }

    let answerRa = null, answerDec = null;

    if (DIFFICULTY === 'hard') {
      const raInput  = document.getElementById('star-ra-input');
      const decInput = document.getElementById('star-dec-input');
      answerRa  = parseFloat(raInput.value);
      answerDec = parseFloat(decInput.value);

      if (isNaN(answerRa) || answerRa < 0 || answerRa > 360) {
        raInput.focus();
        raInput.style.borderColor = 'var(--wrong)';
        setTimeout(() => raInput.style.borderColor = '', 800);
        return;
      }
      if (isNaN(answerDec) || answerDec < -90 || answerDec > 90) {
        decInput.focus();
        decInput.style.borderColor = 'var(--wrong)';
        setTimeout(() => decInput.style.borderColor = '', 800);
        return;
      }
    }

    answered = true;
    document.getElementById('btn-hint').disabled = true;
    document.getElementById('btn-submit-answer').disabled = true;
    nameInput.disabled = true;
    if (DIFFICULTY === 'hard') {
      document.getElementById('star-ra-input').disabled = true;
      document.getElementById('star-dec-input').disabled = true;
    }

    const timeSec = ((Date.now() - questionStartTime) / 1000).toFixed(1);
    const body = {
      session_id:   sessionId,
      answer:       starName,
      used_hint:    usedHint,
      time_seconds: parseFloat(timeSec),
    };
    if (DIFFICULTY === 'hard') {
      body.answer_ra  = answerRa;
      body.answer_dec = answerDec;
    }

    const resp = await fetch('/game/api/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();   // или r.json() в game_messier
    // Обработка ошибки сервера (например "No active question")
    if (data.error) {
      console.error('Ошибка ответа:', data.error);
      // Сброс флага и перезагрузка вопроса
      answered = false;
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
      document.getElementById('result-area').innerHTML =
        `<div style="color:#f87171;text-align:center">⚠️ Ошибка: ${data.error}. Перезагрузка...</div>`;
      setTimeout(() => loadQuestion(), 1500);
      return;
    }
    updateHeader(data);

    // Highlight input field
    nameInput.className = 'star-input ' + (data.correct ? 'input-correct' : 'input-wrong');

    showResult(data, answerRa, answerDec);
    document.getElementById('btn-next').disabled = false;
  }

  // ── Show result card ──────────────────────────────────────────────────────
  function showResult(data, userRa, userDec) {
    const el  = document.getElementById('result-area');
    const cls = data.correct ? 'correct-card' : 'wrong-card';
    const pts = data.correct ? `<span class="points-badge">+${data.points_earned}</span>` : '';

    let coordsFeedback = '';
    if (DIFFICULTY === 'hard' && data.coord_feedback) {
      const cf = data.coord_feedback;
      const raOk  = cf.ra_ok;
      const decOk = cf.dec_ok;
      const nameOk = data.name_correct;

      if (!data.correct) {
        coordsFeedback = `
          <div style="font-size:.85rem;margin-top:8px;display:flex;flex-direction:column;gap:4px">
            <div class="partial-result ${nameOk ? 'partial-correct' : 'partial-wrong'}">
              ${nameOk ? '✅' : '❌'} Название: ${nameOk ? 'верно' : `неверно — правильно <b>${data.correct_answer}</b>`}
            </div>
            <div class="partial-result ${raOk ? 'partial-correct' : 'partial-wrong'}">
              ${raOk ? '✅' : '❌'} RA: ваш ${cf.user_ra}° — правильный ${cf.correct_ra}°
              ${raOk ? '' : `(разница ${cf.ra_diff}°)`}
            </div>
            <div class="partial-result ${decOk ? 'partial-correct' : 'partial-wrong'}">
              ${decOk ? '✅' : '❌'} Dec: ваш ${cf.user_dec}° — правильный ${cf.correct_dec}°
              ${decOk ? '' : `(разница ${cf.dec_diff}°)`}
            </div>
          </div>`;
      } else {
        coordsFeedback = `
          <div style="font-size:.85rem;margin-top:8px;color:var(--correct)">
            ✅ Название верно &nbsp;•&nbsp; RA ±${cf.ra_diff}° &nbsp;•&nbsp; Dec ±${cf.dec_diff}°
          </div>`;
      }
    } else if (!data.correct) {
      coordsFeedback = `<div style="font-size:.9rem;margin-top:4px">Правильный ответ: <b>${data.correct_answer}</b></div>`;
    }

    el.innerHTML = `
      <div class="result-card ${cls}">
        <div class="result-title">${data.correct ? '✅ Верно!' : '❌ Неверно.'} ${pts}</div>
        ${coordsFeedback}
        <div class="result-fact">${data.fun_fact || ''}</div>
      </div>`;
  }

  // ── Hint ──────────────────────────────────────────────────────────────────
  async function useHint() {
    document.getElementById('btn-hint').disabled = true;
    usedHint = true;
    const resp = await fetch(`/game/api/hint?session_id=${sessionId}`);
    const data = await resp.json();
    const hb = document.getElementById('hint-box');
    hb.textContent = '💡 ' + (data.hint || 'Подсказка недоступна');
    hb.style.display = 'block';
  }

  // ── Next question ─────────────────────────────────────────────────────────
  async function nextQuestion() {
    document.getElementById('btn-next').disabled = true;
    await loadQuestion();
  }

  // ── Header / progress ─────────────────────────────────────────────────────
  function updateHeader(s) {
    document.getElementById('hdr-round').textContent  = s.round || 0;
    document.getElementById('hdr-total').textContent  = s.total_rounds || ROUNDS;
    document.getElementById('hdr-score').textContent = s.total_score ?? s.score ?? 0;
    document.getElementById('hdr-streak').textContent = s.streak || 0;
    const pct = ((s.round || 0) / (s.total_rounds || ROUNDS)) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  // ── Finish screen ─────────────────────────────────────────────────────────
  function showFinish(data) {
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('finish-screen').style.display = 'block';
    document.getElementById('finish-rank').textContent       = data.rank || '⭐';
    document.getElementById('finish-score-val').textContent  = data.score || 0;
    document.getElementById('fs-correct').textContent        = data.correct_count || 0;
    document.getElementById('fs-acc').textContent            = (data.accuracy || 0) + '%';
    document.getElementById('fs-streak').textContent         = data.best_streak || 0;
  }

  function restartGame() {
    location.href = `/game/star?difficulty=${DIFFICULTY}&rounds=${ROUNDS}`;
  }

  initGame();
</script>
</body>
</html>
