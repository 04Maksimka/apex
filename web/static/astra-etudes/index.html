<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraEtudes — Астрономические Сценарии</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #020912;
    --panel:   #040f22;
    --border:  rgba(0,110,255,0.18);
    --accent:  #1A8FFF;
    --text:    #7AADCC;
    --dim:     #2A4060;
    --green:   #00E8C0;
    --yellow:  #FFD348;
    --purple:  #CC88FF;
    --orange:  #FF6B3D;
    --red:     #FF4466;
  }

  html, body {
    min-height: 100%; background: var(--bg);
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
  }

  /* ── Звёздный фон ── */
  #stars-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── Шапка ── */
  header {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(4,15,34,0.85);
    backdrop-filter: blur(8px);
  }
  .header-brand {
    display: flex; align-items: center; gap: 14px;
  }
  .header-brand .logo {
    width: 38px; height: 38px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-brand h1 {
    font-family: 'Exo 2', sans-serif;
    font-weight: 800; font-size: 20px;
    letter-spacing: .12em; color: #fff;
  }
  .header-brand h1 span { color: var(--accent); }
  .header-brand p { font-size: 9px; color: var(--dim); letter-spacing: .12em; margin-top: 2px; }

  .nav-back {
    font-size: 11px; color: var(--dim);
    text-decoration: none; letter-spacing: .08em;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 14px;
    transition: color .2s, border-color .2s;
  }
  .nav-back:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Hero ── */
  .hero {
    position: relative; z-index: 1;
    text-align: center; padding: 64px 32px 48px;
  }
  .hero-tag {
    display: inline-block;
    font-size: 10px; letter-spacing: .2em; color: var(--accent);
    border: 1px solid rgba(26,143,255,.3); border-radius: 20px;
    padding: 4px 14px; margin-bottom: 20px;
  }
  .hero h2 {
    font-family: 'Exo 2', sans-serif; font-weight: 800;
    font-size: clamp(28px, 4vw, 48px);
    color: #fff; line-height: 1.15; margin-bottom: 16px;
    letter-spacing: .04em;
  }
  .hero h2 em { font-style: normal; color: var(--accent); }
  .hero p {
    font-size: 13px; color: var(--dim); max-width: 520px;
    margin: 0 auto; line-height: 1.8; letter-spacing: .04em;
  }

  /* ── Фильтры ── */
  .filters {
    position: relative; z-index: 1;
    display: flex; justify-content: center; flex-wrap: wrap;
    gap: 8px; padding: 0 32px 32px;
  }
  .filter-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: .1em;
    padding: 5px 14px;
    border: 1px solid var(--border); border-radius: 20px;
    background: transparent; color: var(--dim); cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: rgba(26,143,255,.15);
    border-color: var(--accent); color: var(--accent);
  }

  /* ── Сетка карточек ── */
  .grid {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px; padding: 0 32px 64px;
    max-width: 1280px; margin: 0 auto;
  }

  /* ── Карточка ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    text-decoration: none; display: flex; flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(26,143,255,.5);
    box-shadow: 0 8px 32px rgba(0,80,200,.2);
  }
  .card:hover .card-thumb { filter: brightness(1.15); }

  .card-thumb {
    height: 148px; position: relative; overflow: hidden;
    transition: filter .3s;
  }
  .card-thumb canvas { width: 100%; height: 100%; display: block; }

  .card-tag {
    position: absolute; top: 10px; left: 10px;
    font-size: 9px; letter-spacing: .12em;
    padding: 3px 9px; border-radius: 3px;
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
  }
  .card-tag.mechanics   { background: rgba(0,232,192,.15); color: var(--green);  border: 1px solid rgba(0,232,192,.3); }
  .card-tag.optics      { background: rgba(255,211,72,.12); color: var(--yellow); border: 1px solid rgba(255,211,72,.25); }
  .card-tag.waves       { background: rgba(204,136,255,.12); color: var(--purple); border: 1px solid rgba(204,136,255,.25); }
  .card-tag.stellar     { background: rgba(255,107,61,.12); color: var(--orange); border: 1px solid rgba(255,107,61,.25); }
  .card-tag.soon        { background: rgba(42,64,96,.4); color: var(--dim);      border: 1px solid var(--border); }

  .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-title {
    font-family: 'Exo 2', sans-serif; font-weight: 600;
    font-size: 14px; color: #C8DFF0; letter-spacing: .04em;
  }
  .card-desc { font-size: 10px; color: var(--dim); line-height: 1.7; flex: 1; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
  }
  .card-difficulty { color: var(--dim); letter-spacing: .08em; }
  .card-arrow { color: var(--accent); font-size: 14px; }
  .card.disabled { opacity: .45; pointer-events: none; cursor: default; }

  /* ── Счётчик ── */
  .count-bar {
    position: relative; z-index: 1;
    text-align: center; padding: 0 0 20px;
    font-size: 10px; color: var(--dim); letter-spacing: .1em;
  }
  .count-bar span { color: var(--accent); }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<header>
  <div class="header-brand">
    <div class="logo">✦</div>
    <div>
      <h1>Astra<span>Etudes</span></h1>
      <p>ИНТЕРАКТИВНЫЕ АСТРОНОМИЧЕСКИЕ СЦЕНАРИИ</p>
    </div>
  </div>
  <a href="/" class="nav-back">← ГЛАВНАЯ</a>
</header>

<section class="hero">
  <div class="hero-tag">PHYSICS · ASTRONOMY · SIMULATION</div>
  <h2>Исследуй законы<br><em>Вселенной</em> в действии</h2>
  <p>Каждый этюд — это интерактивная физическая модель астрономического явления.
     Меняй параметры и наблюдай, как работают законы природы.</p>
</section>

<div class="filters">
  <button class="filter-btn active" data-filter="all">ВСЕ</button>
  <button class="filter-btn" data-filter="mechanics">МЕХАНИКА</button>
  <button class="filter-btn" data-filter="optics">ОПТИКА</button>
  <button class="filter-btn" data-filter="waves">ВОЛНЫ</button>
  <button class="filter-btn" data-filter="stellar">ЗВЁЗДЫ</button>
</div>

<div class="count-bar">
  Показано: <span id="count-shown">1</span> из <span id="count-total">1</span> сценариев
</div>

<div class="grid" id="grid"></div>

<script>
// ── Звёздный фон ──────────────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let W, H, stars = [];

  function init() {
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    stars = Array.from({length: 280}, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.4 + 0.2,
      a: Math.random() * 0.6 + 0.15,
      sp: Math.random() * 0.0004 + 0.0001,
    }));
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const flicker = s.a * (0.7 + 0.3 * Math.sin(t * s.sp * 1000 + s.x * 99));
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${flicker})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init(); requestAnimationFrame(draw);
})();

// ── Данные сценариев ──────────────────────────────────────────────────────────
const SCENARIOS = [
  {
    id: "orbital-simulator",
    title: "Орбитальный Симулятор",
    desc: "Бросок тела в гравитационном поле Земли. Численная траектория RK4, орбитальные элементы, конические сечения.",
    tag: "mechanics",
    tagLabel: "Механика",
    difficulty: "★★☆",
    href: "/astra-etudes/orbital-simulator",
    thumb: drawOrbital,
    enabled: true,
  },
  {
    id: "lunar-phases",
    title: "Фазы Луны",
    desc: "Геометрия освещения спутника. Зависимость наблюдаемой фазы от взаимного расположения Земли, Луны и Солнца.",
    tag: "optics",
    tagLabel: "Оптика",
    difficulty: "★☆☆",
    href: "#",
    thumb: drawLunar,
    enabled: false,
  },
  {
    id: "doppler-star",
    title: "Эффект Доплера в спектре",
    desc: "Сдвиг спектральных линий при движении звезды. Определение лучевой скорости по красному и синему смещениям.",
    tag: "waves",
    tagLabel: "Волны",
    difficulty: "★★☆",
    href: "#",
    thumb: drawDoppler,
    enabled: false,
  },
  {
    id: "black-body",
    title: "Закон Планка",
    desc: "Излучение абсолютно чёрного тела. Кривые спектральной яркости, закон Вина и закон Стефана–Больцмана.",
    tag: "stellar",
    tagLabel: "Звёзды",
    difficulty: "★★★",
    href: "#",
    thumb: drawBlackbody,
    enabled: false,
  },
  {
    id: "eclipse",
    title: "Затмения",
    desc: "Солнечное и лунное затмения. Геометрия тени, зона полной и частичной тени, условия наступления.",
    tag: "optics",
    tagLabel: "Оптика",
    difficulty: "★★☆",
    href: "#",
    thumb: drawEclipse,
    enabled: false,
  },
  {
    id: "binary-star",
    title: "Двойные Звёзды",
    desc: "Гравитационно связанная пара звёзд. Вращение вокруг общего центра масс, орбитальный период, закон Кеплера.",
    tag: "stellar",
    tagLabel: "Звёзды",
    difficulty: "★★★",
    href: "#",
    thumb: drawBinary,
    enabled: false,
  },
];

// ── Превью-рисунки для карточек ───────────────────────────────────────────────
function drawOrbital(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#020912'; ctx.fillRect(0, 0, W, H);
  // Земля
  const cx = W * 0.38, cy = H * 0.6, er = 28;
  const g = ctx.createRadialGradient(cx-5,cy-5,0,cx,cy,er);
  g.addColorStop(0,'#82CCFF'); g.addColorStop(0.5,'#2060AA'); g.addColorStop(1,'#071C35');
  ctx.beginPath(); ctx.arc(cx,cy,er,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  // Атмосфера
  const ag = ctx.createRadialGradient(cx,cy,er,cx,cy,er*1.3);
  ag.addColorStop(0,'rgba(70,150,255,0.3)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,er*1.3,0,Math.PI*2); ctx.fillStyle=ag; ctx.fill();
  // Орбита (эллипс)
  ctx.beginPath(); ctx.ellipse(cx+18, cy-8, 70, 44, -0.3, 0, Math.PI*2);
  ctx.strokeStyle='rgba(255,107,61,0.7)'; ctx.lineWidth=1.8; ctx.stroke();
  // Спутник
  const sx = cx + 18 + 70*Math.cos(0.9), sy = cy - 8 - 44*Math.sin(0.9);
  ctx.beginPath(); ctx.arc(sx, sy, 4, 0, Math.PI*2);
  ctx.fillStyle='#FF6B3D'; ctx.fill();
  // Звёзды
  [[10,10],[50,20],[80,8],[100,35],[130,15],[160,28],[200,12],[240,22],[270,40]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x, y, 0.9, 0, Math.PI*2);
    ctx.fillStyle='rgba(200,220,255,0.5)'; ctx.fill();
  });
}

function drawLunar(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#020912'; ctx.fillRect(0, 0, W, H);
  // Солнце
  const sg = ctx.createRadialGradient(W*0.1, H*0.5, 0, W*0.1, H*0.5, 24);
  sg.addColorStop(0,'#FFE080'); sg.addColorStop(0.5,'#FF9020'); sg.addColorStop(1,'rgba(255,80,0,0)');
  ctx.beginPath(); ctx.arc(W*0.1, H*0.5, 24, 0, Math.PI*2); ctx.fillStyle=sg; ctx.fill();
  // Земля
  ctx.beginPath(); ctx.arc(W*0.45, H*0.5, 16, 0, Math.PI*2);
  ctx.fillStyle='#1A4E8A'; ctx.fill();
  ctx.beginPath(); ctx.arc(W*0.45, H*0.5, 16, 0, Math.PI*2);
  ctx.strokeStyle='rgba(120,190,255,0.4)'; ctx.lineWidth=2; ctx.stroke();
  // Луна с фазой
  const mx = W*0.75, my = H*0.5, mr = 14;
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI*2);
  ctx.fillStyle='#444'; ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle='#CCC'; ctx.fillRect(mx-mr, my-mr, mr, mr*2);
  ctx.restore();
  // Звёзды
  [[20,18],[100,12],[180,30],[220,15],[260,35],[290,20]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x,y,0.8,0,Math.PI*2);
    ctx.fillStyle='rgba(200,220,255,0.45)'; ctx.fill();
  });
}

function drawDoppler(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#020912'; ctx.fillRect(0, 0, W, H);
  // Спектральный градиент
  const spec = ctx.createLinearGradient(20, 0, W-20, 0);
  spec.addColorStop(0,   '#7B00FF');
  spec.addColorStop(0.16,'#0050FF');
  spec.addColorStop(0.32,'#00CFFF');
  spec.addColorStop(0.5, '#00FF80');
  spec.addColorStop(0.67,'#FFFF00');
  spec.addColorStop(0.83,'#FF6000');
  spec.addColorStop(1,   '#FF0000');
  ctx.fillStyle = spec;
  ctx.fillRect(20, H*0.3, W-40, H*0.4);
  // Линии поглощения (смещённые)
  [0.25, 0.41, 0.62, 0.78].forEach(pos => {
    const x = 20 + (W-40)*(pos+0.06);
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(x, H*0.3, 3, H*0.4);
  });
  ctx.fillStyle='rgba(255,100,50,0.7)';
  ctx.font = "10px 'Share Tech Mono', monospace";
  ctx.fillText('КРАСНОЕ СМЕЩЕНИЕ →', 20, H*0.22);
}

function drawBlackbody(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#020912'; ctx.fillRect(0, 0, W, H);
  const temps = [[3000,'#FF4400',0.7],[5778,'#FFE060',0.9],[10000,'#AAC0FF',0.65],[20000,'#7090FF',0.45]];
  temps.forEach(([T, col, alpha]) => {
    const peak = 2898000 / T;
    ctx.beginPath();
    for (let i = 0; i <= 120; i++) {
      const lam = 200 + i * 60; // nm
      const x = 10 + (lam-200)/7200*((W-20));
      const num = Math.pow(lam, -5);
      const exponent = Math.min(50, 14388000/(lam*T));
      const y = num / (Math.exp(exponent) - 1);
      const yn = H*0.85 - y * 2.5e55 * H * 0.65;
      i===0 ? ctx.moveTo(x, H*0.85) : ctx.lineTo(x, Math.max(5, yn));
    }
    ctx.lineTo(W-10, H*0.85); ctx.closePath();
    ctx.fillStyle = col.replace('#','rgba(').replace(/(..)(..)(..)/, (m,r,g,b) =>
      `${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},${alpha})`);
    ctx.fill();
  });
}

function drawEclipse(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle='#020912'; ctx.fillRect(0,0,W,H);
  // Солнце (частично за)
  const sg = ctx.createRadialGradient(W*0.15,H*0.5,0,W*0.15,H*0.5,40);
  sg.addColorStop(0,'#FFEF90'); sg.addColorStop(0.6,'#FF8800'); sg.addColorStop(1,'rgba(255,80,0,0)');
  ctx.beginPath(); ctx.arc(W*0.15,H*0.5,40,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
  // Корона
  for(let a=0;a<Math.PI*2;a+=Math.PI/8){
    ctx.beginPath(); ctx.moveTo(W*0.15+33*Math.cos(a), H*0.5+33*Math.sin(a));
    ctx.lineTo(W*0.15+55*Math.cos(a), H*0.5+55*Math.sin(a));
    ctx.strokeStyle='rgba(255,220,100,0.3)'; ctx.lineWidth=3; ctx.stroke();
  }
  // Луна
  ctx.beginPath(); ctx.arc(W*0.15+6, H*0.5, 28, 0, Math.PI*2);
  ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.arc(W*0.15+6, H*0.5, 28, 0, Math.PI*2);
  ctx.strokeStyle='rgba(200,200,200,0.15)'; ctx.lineWidth=1; ctx.stroke();
  // Звёзды (видны при затмении)
  [[100,20],[140,40],[180,15],[220,35],[260,20],[290,45]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x,y,1.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,200,0.8)'; ctx.fill();
  });
}

function drawBinary(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle='#020912'; ctx.fillRect(0,0,W,H);
  // Орбиты
  ctx.beginPath(); ctx.ellipse(W*0.5, H*0.5, 55, 30, 0.2, 0, Math.PI*2);
  ctx.strokeStyle='rgba(200,150,255,0.2)'; ctx.lineWidth=1; ctx.setLineDash([4,5]); ctx.stroke(); ctx.setLineDash([]);
  ctx.beginPath(); ctx.ellipse(W*0.5, H*0.5, 28, 15, 0.2, 0, Math.PI*2);
  ctx.strokeStyle='rgba(100,200,255,0.2)'; ctx.lineWidth=1; ctx.setLineDash([4,5]); ctx.stroke(); ctx.setLineDash([]);
  // Центр масс
  ctx.beginPath(); ctx.arc(W*0.5, H*0.5, 2.5, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();
  // Звезда 1 (большая)
  const g1 = ctx.createRadialGradient(W*0.5+55,H*0.5,0,W*0.5+55,H*0.5,18);
  g1.addColorStop(0,'#FFE080'); g1.addColorStop(0.6,'#FF6020'); g1.addColorStop(1,'rgba(255,50,0,0)');
  ctx.beginPath(); ctx.arc(W*0.5+55,H*0.5,18,0,Math.PI*2); ctx.fillStyle=g1; ctx.fill();
  // Звезда 2 (малая)
  const g2 = ctx.createRadialGradient(W*0.5-28,H*0.5,0,W*0.5-28,H*0.5,10);
  g2.addColorStop(0,'#C0E0FF'); g2.addColorStop(0.6,'#4080FF'); g2.addColorStop(1,'rgba(20,50,255,0)');
  ctx.beginPath(); ctx.arc(W*0.5-28,H*0.5,10,0,Math.PI*2); ctx.fillStyle=g2; ctx.fill();
  // Линия связи (гравитация)
  ctx.beginPath(); ctx.moveTo(W*0.5+55,H*0.5); ctx.lineTo(W*0.5-28,H*0.5);
  ctx.strokeStyle='rgba(200,220,255,0.08)'; ctx.lineWidth=1; ctx.stroke();
}

// ── Рендер сетки ──────────────────────────────────────────────────────────────
function renderGrid(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const visible = SCENARIOS.filter(s => filter==='all' || s.tag===filter);
  document.getElementById('count-shown').textContent = visible.filter(s=>s.enabled).length;
  document.getElementById('count-total').textContent  = SCENARIOS.filter(s=>s.enabled).length;

  visible.forEach(scenario => {
    const card = document.createElement(scenario.enabled ? 'a' : 'div');
    if (scenario.enabled) card.href = scenario.href;
    card.className = 'card' + (scenario.enabled ? '' : ' disabled');

    const thumbDiv = document.createElement('div');
    thumbDiv.className = 'card-thumb';
    const cnv = document.createElement('canvas');
    cnv.width = 300; cnv.height = 148;
    thumbDiv.appendChild(cnv);
    scenario.thumb(cnv);

    const tagEl = document.createElement('div');
    tagEl.className = `card-tag ${scenario.enabled ? scenario.tag : 'soon'}`;
    tagEl.textContent = scenario.enabled ? scenario.tagLabel : 'СКОРО';
    thumbDiv.appendChild(tagEl);

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = `<div class="card-title">${scenario.title}</div>
                      <div class="card-desc">${scenario.desc}</div>`;

    const footer = document.createElement('div');
    footer.className = 'card-footer';
    footer.innerHTML = `<span class="card-difficulty">${scenario.difficulty}</span>
                        <span class="card-arrow">${scenario.enabled ? '→' : '—'}</span>`;

    card.appendChild(thumbDiv);
    card.appendChild(body);
    card.appendChild(footer);
    grid.appendChild(card);
  });
}

// ── Фильтры ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.filter);
  });
});

renderGrid('all');
</script>
</body>
</html>
